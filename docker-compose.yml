
services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-mawise/quill}:main
    ports:
      - "8080:80"
    environment:
      - DB_TYPE=mysql
      - DB_HOST=db
      - DB_NAME=quill
      - DB_USERNAME=quill
      - DB_PASSWORD=quill_password
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=quill
      - MYSQL_USER=quill
      - MYSQL_PASSWORD=quill_password
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    volumes:
      - ./schema/mysql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
